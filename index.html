<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Dashboard - 每日更新</title>
    <meta name="description" content="AI Dashboard - 每日自动更新 GitHub Trending、AI 产品和行业洞察">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-attachment: fixed;
            min-height: 100vh;
            padding: 20px;
            color: #2d3748;
            overflow-x: hidden;
        }

        /* 添加动态背景动画 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(circle at 20% 80%, rgba(255, 255, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255, 255, 255, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(255, 255, 255, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        /* 添加滚动进度条 */
        .scroll-progress {
            position: fixed;
            top: 0;
            left: 0;
            width: 0%;
            height: 3px;
            background: linear-gradient(90deg, #fff, #ffd700);
            z-index: 9999;
            transition: width 0.1s ease;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            padding: 60px 20px 40px;
            color: white;
            margin-bottom: 40px;
            animation: fadeInDown 0.8s ease;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header h1 {
            font-size: 56px;
            font-weight: 800;
            margin-bottom: 15px;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.3);
            background: linear-gradient(120deg, #fff 0%, #ffd700 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 3s ease-in-out infinite;
        }

        @keyframes shimmer {
            0%, 100% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
        }

        .header p {
            font-size: 20px;
            opacity: 0.95;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.2);
            letter-spacing: 0.5px;
        }

        .update-info {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 15px;
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            display: inline-block;
            position: relative;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            }
            50% {
                box-shadow: 0 4px 20px rgba(255, 255, 255, 0.3);
            }
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(600px, 1fr));
            gap: 30px;
            margin-bottom: 30px;
        }

        .card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 35px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.12);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255, 255, 255, 0.5);
            position: relative;
            overflow: hidden;
            animation: fadeInUp 0.6s ease backwards;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 为不同卡片添加延迟动画 */
        .card:nth-child(1) { animation-delay: 0.1s; }
        .card:nth-child(2) { animation-delay: 0.2s; }
        .card:nth-child(3) { animation-delay: 0.3s; }
        .card:nth-child(4) { animation-delay: 0.4s; }

        /* 卡片光效 */
        .card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                45deg,
                transparent 30%,
                rgba(255, 255, 255, 0.3) 50%,
                transparent 70%
            );
            transform: rotate(45deg);
            transition: all 0.6s;
            opacity: 0;
        }

        .card:hover::before {
            opacity: 1;
            animation: shine 1.5s ease;
        }

        @keyframes shine {
            from {
                transform: translateX(-100%) translateY(-100%) rotate(45deg);
            }
            to {
                transform: translateX(100%) translateY(100%) rotate(45deg);
            }
        }

        .card:hover {
            transform: translateY(-8px) scale(1.01);
            box-shadow: 0 20px 60px rgba(102, 126, 234, 0.25);
            border-color: rgba(102, 126, 234, 0.3);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 3px solid transparent;
            background: linear-gradient(white, white) padding-box,
                        linear-gradient(90deg, #667eea 0%, #764ba2 100%) border-box;
            border-bottom: 3px solid;
            border-image: linear-gradient(90deg, #667eea 0%, #764ba2 100%) 1;
            position: relative;
        }

        .card-icon {
            font-size: 36px;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-5px);
            }
        }

        .card-title {
            font-size: 26px;
            font-weight: 700;
            color: #2d3748;
            background: linear-gradient(120deg, #2d3748 0%, #667eea 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .project-item {
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .project-item::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(102, 126, 234, 0.1), transparent);
            transition: left 0.5s;
        }

        .project-item:hover::after {
            left: 100%;
        }

        .project-item:hover {
            border-color: #667eea;
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.25);
            transform: translateX(5px);
            background: linear-gradient(135deg, #fff 0%, rgba(102, 126, 234, 0.03) 100%);
        }

        .project-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .project-name {
            font-size: 20px;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 8px;
        }

        .project-name a {
            color: inherit;
            text-decoration: none;
        }

        .project-name a:hover {
            text-decoration: underline;
        }

        .description {
            color: #4a5568;
            line-height: 1.6;
            margin: 10px 0;
        }

        .stats {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 12px;
        }

        .stat-badge {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.15) 0%, rgba(118, 75, 162, 0.15) 100%);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            color: #667eea;
            border: 1px solid rgba(102, 126, 234, 0.2);
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .stat-badge:hover {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.25) 0%, rgba(118, 75, 162, 0.25) 100%);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
        }

        .tech-stack {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
        }

        .tech-tag {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 6px 14px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .tech-tag::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.3s, height 0.3s;
        }

        .tech-tag:hover::before {
            width: 100px;
            height: 100px;
        }

        .tech-tag:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .toggle-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
            position: relative;
            overflow: hidden;
        }

        .toggle-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .toggle-btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .toggle-btn:hover {
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 6px 25px rgba(102, 126, 234, 0.4);
        }

        .toggle-btn:active {
            transform: translateY(0) scale(0.98);
        }

        .item-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease, padding 0.4s ease;
            padding: 0;
        }

        .item-content.expanded {
            max-height: 2000px;
            padding-top: 15px;
        }

        .insights-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
        }

        .insight-item {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.12) 0%, rgba(118, 75, 162, 0.12) 100%);
            padding: 24px;
            border-radius: 16px;
            border-left: 5px solid #667eea;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .insight-item::before {
            content: '💡';
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 24px;
            opacity: 0.3;
            transition: all 0.3s;
        }

        .insight-item:hover::before {
            opacity: 1;
            transform: scale(1.2) rotate(10deg);
        }

        .insight-item:hover {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.25) 0%, rgba(118, 75, 162, 0.25) 100%);
            transform: translateX(8px) translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.25);
            border-left-width: 8px;
        }

        .insight-item.expanded {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.2) 0%, rgba(118, 75, 162, 0.2) 100%);
            border-left-color: #764ba2;
        }

        .qa-question {
            font-size: 17px;
            font-weight: 700;
            color: #2d3748;
            margin-bottom: 15px;
            line-height: 1.5;
            padding-right: 40px;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .qa-question::before {
            content: '❓';
            flex-shrink: 0;
            font-size: 20px;
        }

        .qa-answer {
            color: #4a5568;
            font-size: 15px;
            line-height: 1.8;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s ease, opacity 0.5s ease;
            opacity: 0;
            padding-left: 30px;
        }

        .insight-item.expanded .qa-answer {
            max-height: 10000px;
            margin-top: 15px;
            opacity: 1;
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: #667eea;
            font-size: 16px;
        }

        .loading::after {
            content: '';
            display: block;
            width: 50px;
            height: 50px;
            margin: 20px auto;
            border: 4px solid rgba(102, 126, 234, 0.2);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .footer {
            text-align: center;
            padding: 50px 30px;
            color: white;
            font-size: 15px;
            margin-top: 60px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .footer p {
            margin: 10px 0;
            transition: transform 0.3s;
        }

        .footer p:hover {
            transform: scale(1.05);
        }

        .footer a {
            color: #ffd700;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
            position: relative;
        }

        .footer a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: #ffd700;
            transition: width 0.3s;
        }

        .footer a:hover::after {
            width: 100%;
        }

        /* 响应式优化 */
        @media (max-width: 1024px) {
            .grid {
                grid-template-columns: 1fr;
                gap: 25px;
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 15px;
            }

            .header {
                padding: 40px 15px 30px;
            }

            .header h1 {
                font-size: 40px;
            }

            .header p {
                font-size: 16px;
            }

            .card {
                padding: 25px;
                border-radius: 16px;
            }

            .card-title {
                font-size: 22px;
            }

            .project-item {
                padding: 18px;
            }

            .insights-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 480px) {
            .header h1 {
                font-size: 32px;
            }

            .header p {
                font-size: 14px;
            }

            .card {
                padding: 20px;
            }

            .card-icon {
                font-size: 28px;
            }

            .card-title {
                font-size: 20px;
            }

            .update-info {
                font-size: 13px;
                padding: 10px 20px;
            }
        }

        /* 滚动条美化 */
        ::-webkit-scrollbar {
            width: 12px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 6px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
        }
    </style>
</head>
<body>
    <div class="scroll-progress"></div>
    <div class="container">
        <div class="header">
            <h1>🚀 AI Dashboard</h1>
            <p>每日自动更新 · GitHub Trending · AI 产品 · 行业洞察</p>
        </div>

        <div class="update-info">
            <span id="lastUpdate">⏰ 正在加载数据...</span>
        </div>

        <div class="grid">
            <!-- GitHub Trending -->
            <div class="card">
                <div class="card-header">
                    <span class="card-icon">🔥</span>
                    <h2 class="card-title">GitHub Trending</h2>
                </div>
                <div id="github-content" class="loading">加载中...</div>
            </div>

            <!-- AI Products -->
            <div class="card">
                <div class="card-header">
                    <span class="card-icon">🚀</span>
                    <h2 class="card-title">热门 AI 产品</h2>
                </div>
                <div id="products-content" class="loading">加载中...</div>
            </div>
        </div>

        <!-- Inspiration Library -->
        <div class="card">
            <div class="card-header">
                <span class="card-icon">💡</span>
                <h2 class="card-title">AI 产品灵感库</h2>
            </div>
            <div id="inspiration-content" class="loading">加载中...</div>
        </div>

        <!-- AI Insights -->
        <div class="card">
            <div class="card-header">
                <span class="card-icon">📚</span>
                <h2 class="card-title">AI 行业洞察</h2>
            </div>
            <div class="insights-grid" id="insights-content">
                <div class="loading">加载中...</div>
            </div>
        </div>

        <div class="footer">
            <p>🤖 Powered by AI · 数据每天 10:00 自动更新</p>
            <p>💻 Open Source on <a href="https://github.com" style="color: white; text-decoration: underline;">GitHub</a></p>
        </div>
    </div>

    <script>
        // 滚动进度条
        window.addEventListener('scroll', () => {
            const scrollProgress = document.querySelector('.scroll-progress');
            const scrollHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            const scrolled = (window.scrollY / scrollHeight) * 100;
            scrollProgress.style.width = scrolled + '%';
        });

        // 平滑滚动到顶部（可选）
        function scrollToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 加载数据
        async function loadData() {
            try {
                const response = await fetch('data.json');
                const data = await response.json();

                // 更新时间
                document.getElementById('lastUpdate').textContent =
                    `⏰ 最后更新: ${new Date(data.lastUpdate).toLocaleString('zh-CN')}`;

                // 渲染 GitHub 项目
                renderGitHub(data.githubTrending);

                // 渲染 AI 产品
                renderProducts(data.aiProducts);

                // 渲染灵感库
                renderInspiration(data.inspirationLibrary);

                // 渲染面试题
                renderInsights(data.insights);
            } catch (error) {
                console.error('加载数据失败:', error);
                document.getElementById('lastUpdate').textContent = '❌ 数据加载失败';
            }
        }

        function renderGitHub(projects) {
            const container = document.getElementById('github-content');
            container.innerHTML = projects.map((project, index) => {
                const research = project.detailedResearch || project.detailedAnalysis;
                const hasDetails = !!research;
                return `
                <div class="project-item">
                    <div class="project-header">
                        <div>
                            <div class="project-name">
                                <a href="${project.url}" target="_blank">${project.author}/${project.name}</a>
                            </div>
                            <div class="description">${project.description}</div>
                            <div class="stats">
                                <span class="stat-badge">⭐ ${project.stars.toLocaleString()} stars</span>
                                <span class="stat-badge">🔱 ${project.forks.toLocaleString()} forks</span>
                                <span class="stat-badge">💻 ${project.language}</span>
                            </div>
                        </div>
                    </div>
                    ${hasDetails ? `
                    <div class="item-content" id="github-${index}">

                        ${research.researchBackground ? `
                        <div style="background: linear-gradient(135deg, #667eea, #764ba2); padding: 20px; border-radius: 12px; margin: 15px 0; color: white;">
                            <h3 style="color: #ffd700; margin-bottom: 15px; font-size: 20px;">📋 模块1: 调研背景与目标</h3>
                            <div style="margin: 10px 0;"><strong>调研背景:</strong> ${research.researchBackground.why}</div>
                            <div style="margin: 10px 0;"><strong>核心目标:</strong> ${research.researchBackground.coreObjective}</div>
                            <div style="margin: 10px 0;"><strong>调研范围:</strong> ${research.researchBackground.scope}</div>
                        </div>
                        ` : ''}

                        ${research.marketEnvironment ? `
                        <div style="background: #f7fafc; padding: 20px; border-radius: 12px; margin: 15px 0; border-left: 5px solid #667eea;">
                            <h3 style="color: #667eea; margin-bottom: 15px; font-size: 20px;">🌍 模块2: 市场与宏观环境</h3>
                            <h4 style="color: #764ba2; margin-top: 15px;">PEST分析</h4>
                            <div style="margin: 8px 0;"><strong>政策:</strong> ${research.marketEnvironment.pest.political}</div>
                            <div style="margin: 8px 0;"><strong>经济:</strong> ${research.marketEnvironment.pest.economic}</div>
                            <div style="margin: 8px 0;"><strong>社会:</strong> ${research.marketEnvironment.pest.social}</div>
                            <div style="margin: 8px 0;"><strong>技术:</strong> ${research.marketEnvironment.pest.technology}</div>

                            <h4 style="color: #764ba2; margin-top: 15px;">市场规模</h4>
                            <div style="margin: 8px 0;"><strong>TAM:</strong> ${research.marketEnvironment.marketSize.tam}</div>
                            <div style="margin: 8px 0;"><strong>SAM:</strong> ${research.marketEnvironment.marketSize.sam}</div>
                            <div style="margin: 8px 0;"><strong>SOM:</strong> ${research.marketEnvironment.marketSize.som}</div>
                            <div style="margin: 8px 0;"><strong>CAGR:</strong> ${research.marketEnvironment.marketSize.cagr}</div>

                            <h4 style="color: #764ba2; margin-top: 15px;">竞争格局</h4>
                            <p style="line-height: 1.8;">${research.marketEnvironment.competitiveLandscape}</p>
                        </div>
                        ` : ''}

                        ${research.userInsights ? `
                        <div style="background: linear-gradient(135deg, rgba(102, 126, 234, 0.15), rgba(118, 75, 162, 0.15)); padding: 20px; border-radius: 12px; margin: 15px 0;">
                            <h3 style="color: #667eea; margin-bottom: 15px; font-size: 20px;">👥 模块3: 用户与需求洞察</h3>

                            <h4 style="color: #764ba2; margin-top: 15px;">目标用户画像</h4>
                            ${research.userInsights.targetUsers.map(user => `
                                <div style="background: white; padding: 15px; border-radius: 8px; margin: 10px 0; border-left: 4px solid #48bb78;">
                                    <div style="font-weight: bold; color: #667eea; margin-bottom: 8px;">${user.persona}</div>
                                    <div style="margin: 5px 0; line-height: 1.6;">${user.description}</div>
                                    <div style="margin: 5px 0; line-height: 1.6;"><strong>痛点:</strong> ${user.painPoint}</div>
                                    <div style="margin: 5px 0; line-height: 1.6;"><strong>付费意愿:</strong> ${user.paymentWillingness}</div>
                                    <div style="margin: 8px 0; padding: 8px; background: #f7fafc; border-radius: 4px; font-style: italic;">"${user.quote}"</div>
                                </div>
                            `).join('')}

                            <h4 style="color: #764ba2; margin-top: 15px;">核心痛点</h4>
                            ${research.userInsights.painPoints.map(p => `<div style="margin: 8px 0; line-height: 1.6;">${p}</div>`).join('')}

                            <h4 style="color: #764ba2; margin-top: 15px;">用户决策路径</h4>
                            <div style="margin: 8px 0;"><strong>认知阶段:</strong> ${research.userInsights.decisionJourney.awareness}</div>
                            <div style="margin: 8px 0;"><strong>考虑阶段:</strong> ${research.userInsights.decisionJourney.consideration}</div>
                            <div style="margin: 8px 0;"><strong>购买阶段:</strong> ${research.userInsights.decisionJourney.purchase}</div>
                            <div style="margin: 8px 0;"><strong>推荐阶段:</strong> ${research.userInsights.decisionJourney.advocacy}</div>

                            <h4 style="color: #764ba2; margin-top: 15px;">💡 关键洞察</h4>
                            ${research.userInsights.keyInsights.map(insight => `<div style="margin: 10px 0; padding: 10px; background: white; border-radius: 6px; line-height: 1.6;">${insight}</div>`).join('')}
                        </div>
                        ` : ''}

                        ${research.competitorAnalysis ? `
                        <div style="background: #f7fafc; padding: 20px; border-radius: 12px; margin: 15px 0; border-left: 5px solid #e53e3e;">
                            <h3 style="color: #e53e3e; margin-bottom: 15px; font-size: 20px;">🔍 模块4: 竞品深度拆解</h3>
                            ${research.competitorAnalysis.direct ? `
                                <h4 style="color: #764ba2;">直接竞品</h4>
                                ${research.competitorAnalysis.direct.map(c => `<div style="margin: 8px 0; line-height: 1.6;">${c}</div>`).join('')}
                            ` : ''}
                            ${research.competitorAnalysis.indirect ? `
                                <h4 style="color: #764ba2; margin-top: 12px;">间接竞品</h4>
                                ${research.competitorAnalysis.indirect.map(c => `<div style="margin: 8px 0; line-height: 1.6;">${c}</div>`).join('')}
                            ` : ''}
                            ${research.competitorAnalysis.benchmarks ? `
                                <h4 style="color: #764ba2; margin-top: 12px;">标杆案例</h4>
                                ${research.competitorAnalysis.benchmarks.map(b => `<div style="margin: 8px 0; line-height: 1.6;">${b}</div>`).join('')}
                            ` : ''}
                            ${research.competitorAnalysis.comparisonMatrix ? `
                                <h4 style="color: #764ba2; margin-top: 12px;">对比矩阵</h4>
                                <div style="margin: 8px 0; line-height: 1.6;">${research.competitorAnalysis.comparisonMatrix}</div>
                            ` : ''}
                        </div>
                        ` : ''}

                        ${research.findings ? `
                        <div style="background: linear-gradient(135deg, rgba(237, 137, 54, 0.15), rgba(251, 211, 141, 0.15)); padding: 20px; border-radius: 12px; margin: 15px 0;">
                            <h3 style="color: #ed8936; margin-bottom: 15px; font-size: 20px;">⚡ 模块5: 核心发现与差异化</h3>

                            <h4 style="color: #764ba2;">SWOT分析</h4>
                            <div style="background: white; padding: 15px; border-radius: 8px; margin: 10px 0;">
                                <div style="color: #48bb78; font-weight: bold; margin-bottom: 5px;">优势 (Strengths)</div>
                                ${research.findings.swot.strengths.map(s => `<div style="margin: 5px 0; line-height: 1.6;">${s}</div>`).join('')}
                            </div>
                            <div style="background: white; padding: 15px; border-radius: 8px; margin: 10px 0;">
                                <div style="color: #e53e3e; font-weight: bold; margin-bottom: 5px;">劣势 (Weaknesses)</div>
                                ${research.findings.swot.weaknesses.map(w => `<div style="margin: 5px 0; line-height: 1.6;">${w}</div>`).join('')}
                            </div>
                            <div style="background: white; padding: 15px; border-radius: 8px; margin: 10px 0;">
                                <div style="color: #667eea; font-weight: bold; margin-bottom: 5px;">机会 (Opportunities)</div>
                                ${research.findings.swot.opportunities.map(o => `<div style="margin: 5px 0; line-height: 1.6;">${o}</div>`).join('')}
                            </div>
                            <div style="background: white; padding: 15px; border-radius: 8px; margin: 10px 0;">
                                <div style="color: #ed8936; font-weight: bold; margin-bottom: 5px;">威胁 (Threats)</div>
                                ${research.findings.swot.threats.map(t => `<div style="margin: 5px 0; line-height: 1.6;">${t}</div>`).join('')}
                            </div>

                            ${research.findings.keyFindings ? `
                                <h4 style="color: #764ba2; margin-top: 15px;">核心发现</h4>
                                ${research.findings.keyFindings.map(finding => `
                                    <div style="background: white; padding: 12px; border-radius: 8px; margin: 10px 0;">
                                        <div style="font-weight: bold; color: #667eea; margin-bottom: 5px;">${finding.title}</div>
                                        <div style="margin: 5px 0; line-height: 1.6;">${finding.detail}</div>
                                        <div style="margin: 5px 0; color: #e53e3e; font-weight: 500;">影响: ${finding.impact}</div>
                                    </div>
                                `).join('')}
                            ` : ''}

                            ${research.findings.differentiation ? `
                                <h4 style="color: #764ba2; margin-top: 15px;">差异化优势</h4>
                                ${research.findings.differentiation.whyWinning ? research.findings.differentiation.whyWinning.map(w => `<div style="margin: 8px 0; line-height: 1.6;">${w}</div>`).join('') : ''}
                                ${research.findings.differentiation.moat ? `
                                    <h5 style="color: #667eea; margin-top: 10px;">竞争护城河</h5>
                                    ${research.findings.differentiation.moat.map(m => `<div style="margin: 5px 0; line-height: 1.6;">${m}</div>`).join('')}
                                ` : ''}
                            ` : ''}

                            ${research.findings.antiConsensus ? `
                                <h4 style="color: #764ba2; margin-top: 15px;">⚡ 反共识洞察</h4>
                                ${research.findings.antiConsensus.map(ac => `<div style="margin: 8px 0; padding: 10px; background: white; border-radius: 6px; border-left: 4px solid #ffd700; line-height: 1.6;">${ac}</div>`).join('')}
                            ` : ''}
                        </div>
                        ` : ''}

                        ${research.recommendations ? `
                        <div style="background: linear-gradient(135deg, rgba(72, 187, 120, 0.15), rgba(56, 178, 172, 0.15)); padding: 20px; border-radius: 12px; margin: 15px 0;">
                            <h3 style="color: #48bb78; margin-bottom: 15px; font-size: 20px;">🎯 模块6: 结论与行动建议</h3>

                            <div style="background: white; padding: 15px; border-radius: 8px; margin: 10px 0; border-left: 4px solid #48bb78;">
                                <h4 style="color: #667eea;">核心结论</h4>
                                <p style="line-height: 1.8; font-weight: 500;">${research.recommendations.conclusion}</p>
                            </div>

                            ${research.recommendations.do ? `
                                <h4 style="color: #48bb78; margin-top: 15px;">✅ 建议立即执行 (Do)</h4>
                                ${research.recommendations.do.map(action => `
                                    <div style="background: white; padding: 12px; border-radius: 8px; margin: 10px 0; border-left: 3px solid #48bb78;">
                                        <div style="font-weight: bold; color: #667eea; margin-bottom: 5px;">[${action.priority}] ${action.action}</div>
                                        <div style="margin: 5px 0;"><strong>原因:</strong> ${action.why}</div>
                                        <div style="margin: 5px 0;"><strong>方法:</strong> ${action.how}</div>
                                        <div style="margin: 5px 0;"><strong>时间线:</strong> ${action.timeline}</div>
                                        <div style="margin: 5px 0;"><strong>资源:</strong> ${action.resources}</div>
                                    </div>
                                `).join('')}
                            ` : ''}

                            ${research.recommendations.dont ? `
                                <h4 style="color: #e53e3e; margin-top: 15px;">❌ 明确不做 (Don't)</h4>
                                ${research.recommendations.dont.map(action => `
                                    <div style="background: white; padding: 12px; border-radius: 8px; margin: 10px 0; border-left: 3px solid #e53e3e;">
                                        <div style="font-weight: bold; color: #e53e3e; margin-bottom: 5px;">避免: ${action.avoid}</div>
                                        <div style="margin: 5px 0;"><strong>原因:</strong> ${action.why}</div>
                                        <div style="margin: 5px 0;"><strong>替代方案:</strong> ${action.alternative}</div>
                                    </div>
                                `).join('')}
                            ` : ''}

                            ${research.recommendations.validate ? `
                                <h4 style="color: #ed8936; margin-top: 15px;">🧪 需要验证 (Validate)</h4>
                                ${research.recommendations.validate.map(test => `
                                    <div style="background: white; padding: 12px; border-radius: 8px; margin: 10px 0; border-left: 3px solid #ed8936;">
                                        <div style="font-weight: bold; color: #667eea; margin-bottom: 5px;">假设: ${test.hypothesis}</div>
                                        <div style="margin: 5px 0;"><strong>方法:</strong> ${test.method}</div>
                                        <div style="margin: 5px 0;"><strong>成本:</strong> ${test.cost}</div>
                                        <div style="margin: 5px 0;"><strong>时间线:</strong> ${test.timeline}</div>
                                        <div style="margin: 5px 0;"><strong>决策标准:</strong> ${test.criteria}</div>
                                    </div>
                                `).join('')}
                            ` : ''}

                            ${research.recommendations.roadmap ? `
                                <h4 style="color: #667eea; margin-top: 15px;">🗺️ 执行路线图</h4>
                                ${Object.entries(research.recommendations.roadmap).map(([quarter, data]) => `
                                    <div style="background: white; padding: 12px; border-radius: 8px; margin: 10px 0;">
                                        <div style="font-weight: bold; color: #667eea; margin-bottom: 5px;">${quarter.replace('_', ' ')}</div>
                                        <div style="margin: 5px 0;"><strong>里程碑:</strong> ${data.milestones.join(', ')}</div>
                                        <div style="margin: 5px 0;"><strong>OKR:</strong> ${data.okr}</div>
                                    </div>
                                `).join('')}
                            ` : ''}
                        </div>
                        ` : ''}

                    </div>
                    <button class="toggle-btn" onclick="toggleContent('github-${index}', this)" style="margin-top: 10px;">查看完整PRD调研报告 ▼</button>
                    ` : ''}
                </div>
            `}).join('');
        }

        function renderProducts(products) {
            const container = document.getElementById('products-content');
            container.innerHTML = products.map((product, index) => {
                const hasDetails = product.detailedResearch;
                return `
                <div class="project-item">
                    <div class="project-name">${product.name}</div>
                    <div class="description">${product.tagline}</div>
                    <div class="stats">
                        <span class="stat-badge">🔥 评分: ${product.score}</span>
                        <span class="stat-badge">📁 ${product.category}</span>
                    </div>
                    <div class="tech-stack">
                        ${product.features.map(f => `<span class="tech-tag">${f}</span>`).join('')}
                    </div>
                    ${hasDetails ? `
                    <div class="item-content" id="product-${index}">
                        <div style="background: #f7fafc; padding: 15px; border-radius: 8px; margin: 10px 0;">
                            <h4 style="color: #667eea; margin-bottom: 10px;">📋 产品概述</h4>
                            <p style="line-height: 1.8;">${product.detailedResearch.productOverview}</p>
                        </div>
                        <div style="background: #f7fafc; padding: 15px; border-radius: 8px; margin: 10px 0;">
                            <h4 style="color: #667eea; margin-bottom: 10px;">💰 定价策略</h4>
                            ${Object.entries(product.detailedResearch.pricingStrategy).map(([key, value]) =>
                                `<div style="margin: 8px 0; line-height: 1.6;"><strong>${key}:</strong> ${value}</div>`
                            ).join('')}
                        </div>
                        ${product.detailedResearch.competitiveAdvantage ? `
                        <div style="background: linear-gradient(135deg, rgba(72, 187, 120, 0.1), rgba(56, 178, 172, 0.1)); padding: 15px; border-radius: 8px; margin: 10px 0; border-left: 4px solid #48bb78;">
                            <h4 style="color: #48bb78; margin-bottom: 10px;">🥇 竞争优势</h4>
                            ${product.detailedResearch.competitiveAdvantage.map(a => `<div style="margin: 8px 0; line-height: 1.6;">• ${a}</div>`).join('')}
                        </div>
                        ` : ''}
                    </div>
                    <button class="toggle-btn" onclick="toggleContent('product-${index}', this)" style="margin-top: 10px;">查看完整调研 ▼</button>
                    ` : ''}
                </div>
            `}).join('');
        }

        function renderInspiration(inspirations) {
            const container = document.getElementById('inspiration-content');
            container.innerHTML = inspirations.map((item, index) => {
                const hasDetails = item.completeResearch;
                return `
                <div class="project-item">
                    <div style="font-size: 48px; margin-bottom: 10px;">${item.icon}</div>
                    <div class="project-name">${item.name}</div>
                    <div class="description">${item.tagline}</div>
                    <div class="stats">
                        <span class="stat-badge">🔥 热度: ${item.score}</span>
                        <span class="stat-badge">💬 Reddit: ${item.sources.reddit}</span>
                        <span class="stat-badge">🐦 Twitter: ${item.sources.twitter}</span>
                    </div>
                    <div class="item-content" id="inspiration-${index}">
                        ${hasDetails ? `
                        <div style="background: #f7fafc; padding: 15px; border-radius: 8px; margin: 10px 0;">
                            <h4 style="color: #667eea; margin-bottom: 10px;">📊 市场机会</h4>
                            <div style="margin: 8px 0; line-height: 1.6;"><strong>市场规模:</strong> ${hasDetails.marketOpportunity.size}</div>
                            <div style="margin-top: 10px;"><strong>核心痛点:</strong></div>
                            ${hasDetails.marketOpportunity.painPoints.map(p => `<div style="margin: 5px 0; line-height: 1.6;">${p}</div>`).join('')}
                        </div>
                        <div style="background: linear-gradient(135deg, rgba(102, 126, 234, 0.1), rgba(118, 75, 162, 0.1)); padding: 15px; border-radius: 8px; margin: 10px 0; border-left: 4px solid #667eea;">
                            <h4 style="color: #667eea; margin-bottom: 10px;">💡 优化灵感</h4>
                            ${hasDetails.optimizationIdeas ? hasDetails.optimizationIdeas.map(idea => `<div style="margin: 8px 0; padding: 8px; background: white; border-radius: 5px; line-height: 1.6;">${idea}</div>`).join('') : ''}
                        </div>
                        ${hasDetails.businessModel ? `
                        <div style="background: #f7fafc; padding: 15px; border-radius: 8px; margin: 10px 0;">
                            <h4 style="color: #48bb78; margin-bottom: 10px;">💰 商业模式</h4>
                            ${Object.entries(hasDetails.businessModel).slice(0, 3).map(([key, value]) =>
                                `<div style="margin: 8px 0; line-height: 1.6;"><strong>${key}:</strong> ${value}</div>`
                            ).join('')}
                        </div>
                        ` : ''}
                        ` : `
                        <div class="description">
                            <strong>💡 核心价值:</strong> ${item.analysis.coreValue}<br><br>
                            <strong>🎯 目标用户:</strong> ${item.analysis.targetUsers}<br><br>
                            <strong>⚡ 竞争优势:</strong><br>
                            ${item.analysis.advantages.map(a => `• ${a}`).join('<br>')}
                        </div>
                        `}
                    </div>
                    <button class="toggle-btn" onclick="toggleContent('inspiration-${index}', this)">查看详情 ▼</button>
                </div>
            `}).join('');
        }

        function renderInsights(insights) {
            const container = document.getElementById('insights-content');
            container.innerHTML = insights.map((item, index) => `
                <div class="insight-item" onclick="toggleInsight(this)">
                    <div class="qa-question">Q${index + 1}: ${item.question}</div>
                    <div class="qa-answer">${item.answer}</div>
                </div>
            `).join('');
        }

        function toggleContent(id, btn) {
            const content = document.getElementById(id);
            content.classList.toggle('expanded');
            btn.textContent = content.classList.contains('expanded') ? '收起 ▲' : '查看详情 ▼';
        }

        function toggleInsight(element) {
            element.classList.toggle('expanded');
        }

        // 页面加载时获取数据
        loadData();
    </script>
</body>
</html>
